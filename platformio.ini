; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
build_flags =
	-D STM32F446xx
	-D HSE_VALUE=8000000U
build_src_filter =
	+<*>
	-<app_test/*>

[env:nucleo_f446re_node0]
extends = env:nucleo_f446re
build_flags =
	${env:nucleo_f446re.build_flags}
	-D BOOT_NODE_ID=0

[env:nucleo_f446re_node1]
extends = env:nucleo_f446re
build_flags =
	${env:nucleo_f446re.build_flags}
	-D BOOT_NODE_ID=1

[env:nucleo_f446re_test_app]
extends = env:nucleo_f446re
board_build.ldscript = linker/STM32F446RETX_APP_FLASH.ld
build_src_filter =
	+<app_test/*>
	+<boot_request.c>
	+<stm32f4xx_hal_msp.c>
	+<stm32f4xx_it.c>
